name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Check for vulnerable packages
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerability-report.txt
          ! grep -q "has the following vulnerable packages" vulnerability-report.txt

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"

  package:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish OutSystems.Extension.NodaMoney/OutSystems.Extension.NodaMoney.csproj --configuration Release --output ./publish

      - name: Create ODC package
        run: |
          cd publish
          zip -r ../OutSystems.Extension.NodaMoney.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: OutSystems.Extension.NodaMoney
          path: OutSystems.Extension.NodaMoney.zip

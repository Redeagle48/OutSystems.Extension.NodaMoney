name: CI - Run Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT_NAME: OutSystems.Extension.NodaMoney
  PRODUCT_NAME: NodaMoney

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_NAME }}.Tests/${{ env.PROJECT_NAME }}.Tests.csproj

    - name: Run Tests
      run: |
        dotnet test ${{ env.PROJECT_NAME }}.Tests/${{ env.PROJECT_NAME }}.Tests.csproj \
        --configuration Release \
        --no-restore \
        --nologo \
        --collect:"XPlat Code Coverage" \
        --results-directory ./coverage

    - name: Report Code Coverage
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: coverage/**/coverage.cobertura.xml
        badge: true
        fail_below_min: false
        format: markdown
        output: both

    - name: Write Summary
      run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY
